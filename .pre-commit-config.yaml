default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: rust-fmt-check
        name: rust fmt check (engine-wasm)
        language: system
        pass_filenames: false
        files: ^engine-wasm/engine/
        stages: [pre-push]
        entry: bash -lc 'cd engine-wasm/engine && cargo fmt --check'

      - id: rust-clippy-engine
        name: rust clippy (engine-wasm)
        language: system
        pass_filenames: false
        files: ^engine-wasm/engine/
        stages: [pre-push]
        entry: bash -lc 'cd engine-wasm/engine && cargo clippy --all-targets --all-features -- -D warnings'

      # Keep tests on pre-push to avoid slowing every commit.
      - id: rust-test
        name: rust test (engine-wasm)
        language: system
        pass_filenames: false
        files: ^engine-wasm/engine/
        stages: [pre-push]
        entry: bash -lc 'cd engine-wasm/engine && cargo test'

      - id: rust-coverage-engine
        name: rust coverage (engine-wasm, optional)
        language: system
        pass_filenames: false
        files: ^engine-wasm/engine/
        stages: [pre-push]
        entry: >-
          bash -lc 'if [ "${WAP_ENABLE_RUST_COVERAGE_HOOKS:-0}" != "1" ]; then
          echo "skip: set WAP_ENABLE_RUST_COVERAGE_HOOKS=1 to enable rust coverage hook";
          exit 0; fi; if ! command -v cargo >/dev/null 2>&1; then echo "skip:
          cargo not found"; exit 0; fi; if ! (cd engine-wasm/engine && cargo
          llvm-cov --version >/dev/null 2>&1); then echo "skip:
          cargo-llvm-cov not installed"; exit 0; fi; cd engine-wasm/engine &&
          cargo llvm-cov --all-features --summary-only --fail-under-lines
          "${WAP_RUST_COVERAGE_MIN:-90}" --fail-under-functions
          "${WAP_RUST_FUNCTION_COVERAGE_MIN:-85}"'

      - id: rust-fmt-check-browser
        name: rust fmt check (browser tauri)
        language: system
        pass_filenames: false
        files: ^browser/src-tauri/
        stages: [pre-push]
        entry: bash -lc 'cd browser/src-tauri && cargo fmt --check'

      - id: rust-clippy-browser
        name: rust clippy (browser tauri)
        language: system
        pass_filenames: false
        files: ^browser/src-tauri/
        stages: [pre-push]
        entry: bash -lc 'cd browser/src-tauri && cargo clippy --all-targets --all-features -- -D warnings'

      - id: rust-fmt-check-transport
        name: rust fmt check (transport-rust)
        language: system
        pass_filenames: false
        files: ^transport-rust/
        stages: [pre-push]
        entry: bash -lc 'cd transport-rust && cargo fmt --check'

      - id: rust-clippy-transport
        name: rust clippy (transport-rust)
        language: system
        pass_filenames: false
        files: ^transport-rust/
        stages: [pre-push]
        entry: bash -lc 'cd transport-rust && cargo clippy --all-targets --all-features -- -D warnings'

      - id: host-sample-build
        name: WaveNav host-sample build sanity
        language: system
        pass_filenames: false
        files: ^engine-wasm/host-sample/
        stages: [pre-push]
        entry: >-
          bash -lc 'if [ "${WAP_ENABLE_NODE_HOOKS:-0}" != "1" ]; then
          echo "skip: set WAP_ENABLE_NODE_HOOKS=1 to enable node hooks"; exit 0;
          fi; if ! command -v node >/dev/null 2>&1; then echo "skip: node not
          found"; exit 0; fi; node -e "const [M,m]=process.versions.node.split(\".\").map(Number);
          if(M<20 || (M===20&&m<19)){process.exit(1)}" || { echo "skip: node
          $(node -v) is <20.19; using CI for node checks"; exit 0; }; if [ ! -f
          engine-wasm/pkg/wavenav_engine.js ]; then if command -v wasm-pack
          >/dev/null 2>&1; then cd engine-wasm/engine && wasm-pack build --target
          web --out-dir ../pkg && cd ../..; else echo "skip: wasm pkg missing and
          wasm-pack not installed"; exit 0; fi; fi; cd engine-wasm/host-sample
          && pnpm run build'

      # Future hooks (intentionally disabled until those layers are bootstrapped):
      # - browser frontend lint/typecheck/test
