group = core
admin-port = 13000
wapbox-port = 13002
admin-password = changeme
status-password = changeme
box-allow-ip = 127.0.0.1
wdp-interface-name = "*"
log-file = "/var/log/kannel/kannel.log"
log-level = 1

group = wapbox
bearerbox-host = localhost
# Route WSP requests coming to gateway port 13002 to the local WML app server.
device-home = "http://wml-server:3000/"

group = wap-url-map
name = local_gateway
url = "http://localhost:13002/*"
map-url = "http://wml-server:3000/*"

group = wap-url-map
name = wap_alias
url = "http://wap/*"
map-url = "http://wml-server:3000/*"

group = wap-url-map
name = host_gateway
url = "http://10.0.2.2/*"
map-url = "http://wml-server:3000/*"
