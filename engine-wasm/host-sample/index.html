<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveNav Host Sample</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="controls">
        <h1>WaveNav Quick Harness</h1>
        <p>Keyboard: ArrowUp, ArrowDown, Enter</p>
        <div class="row">
          <label for="example-select">Example Deck</label>
          <select id="example-select"></select>
        </div>
        <section class="example-meta" aria-live="polite">
          <div class="example-meta-header">
            <h2 id="example-title">Example Metadata</h2>
            <button
              id="toggle-example-meta"
              class="meta-toggle"
              type="button"
              aria-expanded="true"
              aria-controls="example-meta-body"
            >
              Collapse
            </button>
          </div>
          <div id="example-meta-body">
            <p id="example-coverage" class="example-coverage"></p>
            <p id="example-description"></p>
            <p id="example-goal"></p>
            <ul id="example-testing-ac"></ul>
          </div>
        </section>
        <section class="editor-wrap">
          <div class="section-header">
            <h2>Deck Editor</h2>
            <button
              id="toggle-editor"
              class="meta-toggle"
              type="button"
              aria-expanded="true"
              aria-controls="editor-body"
            >
              Collapse
            </button>
          </div>
          <div id="editor-body">
            <div class="row">
              <label class="checkbox-row" for="live-reload">
                <input id="live-reload" type="checkbox" />
                Live reload on editor changes (memory only)
              </label>
            </div>
            <textarea id="deck-input" spellcheck="false"></textarea>
          </div>
        </section>
        <div class="buttons">
          <button id="reload-deck" type="button">Reload Deck</button>
          <button id="press-up" type="button">Up</button>
          <button id="press-down" type="button">Down</button>
          <button id="press-enter" type="button">Enter</button>
        </div>
        <p id="status" class="status">Ready.</p>
        <div class="runtime-actions">
          <button id="clear-intent" type="button">Clear Intent</button>
          <button id="copy-intent" type="button">Copy Intent URL</button>
        </div>
        <pre id="runtime-state" class="runtime-state">Waiting for engine...</pre>
        <section class="event-log-wrap">
          <div class="section-header">
            <h2>Event Tracker</h2>
            <button
              id="toggle-event-log"
              class="meta-toggle"
              type="button"
              aria-expanded="true"
              aria-controls="event-log-body"
            >
              Collapse
            </button>
          </div>
          <div id="event-log-body">
            <div class="event-log-actions">
              <button id="clear-event-log" type="button">Clear Current Example Log</button>
              <label class="event-export-label" for="event-log-export-format">Export as</label>
              <select id="event-log-export-format">
                <option value="txt">Text (.txt)</option>
                <option value="json">JSON (.json)</option>
              </select>
              <button id="export-event-log" type="button">Export Current Example Log</button>
            </div>
            <pre id="event-log" class="event-log">No events yet.</pre>
          </div>
        </section>
        <section class="trace-wrap">
          <div class="section-header">
            <h2>Runtime Inspector</h2>
            <button
              id="toggle-trace"
              class="meta-toggle"
              type="button"
              aria-expanded="true"
              aria-controls="trace-body"
            >
              Collapse
            </button>
          </div>
          <div id="trace-body">
            <div class="trace-actions">
              <button id="clear-trace" type="button">Clear Engine Trace</button>
              <label class="trace-export-label" for="trace-export-format">Export as</label>
              <select id="trace-export-format">
                <option value="txt">Text (.txt)</option>
                <option value="json">JSON (.json)</option>
              </select>
              <button id="export-trace" type="button">Export Engine Trace</button>
            </div>
            <div class="trace-filters">
              <span class="trace-presets-label">Presets</span>
              <button id="trace-preset-all" type="button">All</button>
              <button id="trace-preset-scripts" type="button">Scripts</button>
              <button id="trace-preset-navigation" type="button">Navigation</button>
              <button id="trace-preset-traps" type="button">Traps</button>
              <label for="trace-filter-kind">Kind</label>
              <input id="trace-filter-kind" type="text" placeholder="e.g. ACTION_SCRIPT" />
              <label for="trace-filter-card">Card</label>
              <input id="trace-filter-card" type="text" placeholder="e.g. home" />
              <label class="checkbox-row trace-traps-only" for="trace-filter-traps">
                <input id="trace-filter-traps" type="checkbox" />
                Traps only
              </label>
            </div>
            <pre id="engine-trace" class="engine-trace">No engine trace entries yet.</pre>
          </div>
        </section>
      </section>

      <section class="screen-wrap">
        <canvas id="wap-screen" width="240" height="320"></canvas>
      </section>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
