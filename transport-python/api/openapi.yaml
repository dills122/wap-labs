openapi: 3.1.0
info:
  title: Lowband Transport Service API
  version: 0.1.0
  description: |
    Browser-side transport appliance for WSP/WBXML integration.
    It accepts HTTP requests from the UI harness and performs WSP/WDP fetches against a WAP gateway.
servers:
  - url: http://127.0.0.1:8765
paths:
  /fetch:
    post:
      summary: Fetch a WAP resource through gateway transport
      operationId: fetchResource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FetchRequest'
      responses:
        '200':
          description: Fetch completed (success or logical failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FetchResponse'
        '400':
          description: Invalid request payload
        '500':
          description: Unexpected transport failure
components:
  schemas:
    FetchRequest:
      type: object
      additionalProperties: false
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: Absolute URL to fetch through the gateway.
        method:
          type: string
          enum: [GET]
          default: GET
        headers:
          type: object
          description: Optional outbound request headers.
          additionalProperties:
            type: string
        timeoutMs:
          type: integer
          minimum: 100
          maximum: 30000
          default: 5000
        retries:
          type: integer
          minimum: 0
          maximum: 2
          default: 1
    FetchResponse:
      type: object
      additionalProperties: false
      required:
        - ok
        - status
        - finalUrl
        - contentType
        - timingMs
      properties:
        ok:
          type: boolean
          description: True when transport and decode completed successfully.
        status:
          type: integer
          minimum: 0
          description: Upstream/gateway response code when available.
        finalUrl:
          type: string
          description: Final resolved URL after redirects.
        contentType:
          type: string
          description: Detected content type for response payload.
        wml:
          type: string
          description: Decoded WML XML text. Present when ok=true.
        raw:
          $ref: '#/components/schemas/RawPayload'
        error:
          $ref: '#/components/schemas/ErrorInfo'
        timingMs:
          $ref: '#/components/schemas/TimingMs'
        engineDeckInput:
          $ref: '#/components/schemas/EngineDeckInput'
    RawPayload:
      type: object
      additionalProperties: false
      required:
        - bytesBase64
        - contentType
      properties:
        bytesBase64:
          type: string
          description: Raw body payload encoded in base64.
        contentType:
          type: string
    TimingMs:
      type: object
      additionalProperties: false
      required:
        - encode
        - udpRtt
        - decode
      properties:
        encode:
          type: number
          minimum: 0
        udpRtt:
          type: number
          minimum: 0
        decode:
          type: number
          minimum: 0
    ErrorInfo:
      type: object
      additionalProperties: false
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - INVALID_REQUEST
            - GATEWAY_TIMEOUT
            - RETRIES_EXHAUSTED
            - UNSUPPORTED_CONTENT_TYPE
            - WBXML_DECODE_FAILED
            - PROTOCOL_ERROR
            - TRANSPORT_UNAVAILABLE
            - INTERNAL_ERROR
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    EngineDeckInput:
      type: object
      additionalProperties: false
      required:
        - wmlXml
        - baseUrl
        - contentType
      properties:
        wmlXml:
          type: string
          description: Normalized WML XML text for WASM engine ingestion.
        baseUrl:
          type: string
          description: Final URL after redirect resolution.
        contentType:
          type: string
          description: Normalized media type from upstream response.
        rawBytesBase64:
          type: string
          description: Optional raw payload bytes in base64 for debug/fidelity workflows.
