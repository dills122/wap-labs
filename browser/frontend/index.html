<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Waves is a WAP/WML based browser 1.x." />
    <link rel="icon" type="image/svg+xml" href="/waves-icon.svg" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #008080;
      }

      body[data-boot-phase='booting'] #app {
        display: grid;
        min-height: 100vh;
        place-items: center;
      }

      .boot-splash {
        width: min(540px, calc(100vw - 40px));
        border: 2px solid #808080;
        border-right-color: #000000;
        border-bottom-color: #000000;
        background: #c0c0c0;
        padding: 6px;
        color: #222222;
        font-family: 'MS Sans Serif', Tahoma, Verdana, sans-serif;
      }

      .boot-splash-title {
        font-size: 12px;
        font-weight: 700;
        color: #ffffff;
        background: linear-gradient(90deg, #000080 0%, #1084d0 100%);
        padding: 4px 6px;
      }

      .boot-splash-status {
        margin-top: 6px;
        font-size: 12px;
        border: 2px solid #808080;
        border-top-color: #000000;
        border-left-color: #000000;
        background: #ffffff;
        padding: 8px;
      }
    </style>
    <title>Waves Browser</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body data-boot-phase="booting">
    <div id="app">
      <div class="boot-splash" role="status" aria-live="polite">
        <div class="boot-splash-title">Waves Browser</div>
        <div class="boot-splash-status">Initializing host shell...</div>
      </div>
    </div>
  </body>
</html>
