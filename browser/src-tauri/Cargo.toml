[package]
name = "wavenav_host"
version = "0.1.0"
edition = "2021"

[lib]
name = "wavenav_host_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
wavenav_engine = { path = "../../engine-wasm/engine", default-features = false }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
