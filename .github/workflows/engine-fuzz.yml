name: Engine Fuzzing

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      runs:
        description: "Number of fuzz iterations"
        required: false
        default: "20000"
      max_len:
        description: "Maximum input length"
        required: false
        # MAX_DECK_WML_XML_BYTES (engine-wasm/engine/src/lib.rs) is 512 KiB.
        # The previous 4096-byte default could never reach the ~74k nesting
        # depth needed to exercise the parse-tree recursive-drop crash
        # class, since a well-formed nested tag tree needs several bytes
        # per level. Default comfortably above the 512 KiB deck-size limit
        # so inputs near/over that boundary are reachable too.
        default: "600000"
      timeout:
        description: "Per-test execution timeout (libFuzzer seconds)"
        required: false
        default: "20"

permissions:
  contents: read

jobs:
  engine_wasm_fuzz:
    name: Engine WASM fuzz target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@82fc405565b9cf90abfe700ba43b4751ce2fe422 # cargo-fuzz

      - name: Install Ubuntu build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm

      - name: Run engine WML fuzz target
        working-directory: engine-wasm/engine
        run: cargo +nightly fuzz run engine_wml_fuzzer -- -runs=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.runs || '20000' }} -max_len=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_len || '4096' }} -timeout=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.timeout || '20' }}

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: engine-wml-fuzz-artifacts
          path: engine-wasm/engine/fuzz/artifacts/engine_wml_fuzzer
          if-no-files-found: ignore
          retention-days: 14
