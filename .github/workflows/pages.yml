name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'marketing-site/**'
      - 'engine-wasm/host-sample/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy to gh-pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: |
            marketing-site/pnpm-lock.yaml
            engine-wasm/host-sample/pnpm-lock.yaml

      - name: Install marketing-site dependencies
        run: pnpm --dir marketing-site --ignore-workspace install --frozen-lockfile

      - name: Build marketing-site
        run: pnpm --dir marketing-site --ignore-workspace run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wavenav-rust
          workspaces: |
            engine-wasm/engine -> target

      - name: Cache wasm-pack binary
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-0.13.1
          restore-keys: |
            ${{ runner.os }}-wasm-pack-

      - name: Install wasm-pack (if cache miss)
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build WaveNav WASM package
        working-directory: engine-wasm/engine
        run: wasm-pack build --target web --out-dir ../pkg

      - name: Install simulator dependencies
        run: pnpm --dir engine-wasm/host-sample install --frozen-lockfile --config.shared-workspace-lockfile=false

      - name: Build simulator
        run: pnpm --dir engine-wasm/host-sample run build

      - name: Assemble pages artifact
        run: |
          rm -rf _site
          mkdir -p _site/simulator
          cp -R marketing-site/dist/. _site/
          cp -R engine-wasm/host-sample/dist/. _site/simulator/
          touch _site/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: _site
          force_orphan: true
