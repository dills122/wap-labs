name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "43 5 * * 2"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, rust]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml

      - name: Install Linux system deps for Tauri
        if: ${{ matrix.language == 'rust' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Ensure Tauri frontendDist exists for compile-time config
        if: ${{ matrix.language == 'rust' }}
        run: |
          mkdir -p browser/frontend/dist
          test -f browser/frontend/dist/index.html || echo '<!doctype html><title>codeql-placeholder</title>' > browser/frontend/dist/index.html

      - name: Setup Rust toolchain
        if: ${{ matrix.language == 'rust' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust crates for extraction
        if: ${{ matrix.language == 'rust' }}
        run: |
          cargo check --manifest-path engine-wasm/engine/Cargo.toml --all-targets
          cargo check --manifest-path transport-rust/Cargo.toml --all-targets
          cargo check --manifest-path browser/src-tauri/Cargo.toml --all-targets

      - name: Autobuild
        if: ${{ matrix.language == 'javascript-typescript' }}
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
