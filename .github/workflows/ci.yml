name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  RUST_SHARED_KEY: wavenav-rust
  RUST_BROWSER_KEY: wavenav-browser-rust
  ENGINE_COV_LINES: "90"
  ENGINE_COV_FUNCS: "85"
  TRANSPORT_COV_LINES: "88"
  TRANSPORT_COV_FUNCS: "85"
  BROWSER_COV_LINES: "80"
  BROWSER_COV_FUNCS: "65"

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ steps.filter.outputs.ci }}
      rust_engine: ${{ steps.filter.outputs.rust_engine }}
      rust_transport: ${{ steps.filter.outputs.rust_transport }}
      host_sample: ${{ steps.filter.outputs.host_sample }}
      marketing_site: ${{ steps.filter.outputs.marketing_site }}
      browser_shell: ${{ steps.filter.outputs.browser_shell }}
      wml_server: ${{ steps.filter.outputs.wml_server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci:
              - ".github/workflows/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "tsconfig.base.json"
              - "eslint.shared.mjs"
              - ".prettierrc.json"
              - ".prettierignore"
              - "scripts/check-transport-contract-parity.mjs"
            rust_engine:
              - "engine-wasm/engine/**"
              - "engine-wasm/contracts/**"
              - "browser/contracts/engine.ts"
            rust_transport:
              - "transport-rust/**"
              - "browser/contracts/transport.ts"
            host_sample:
              - "engine-wasm/host-sample/**"
              - "engine-wasm/engine/**"
              - "engine-wasm/pkg/**"
            marketing_site:
              - "marketing-site/**"
            browser_shell:
              - "browser/**"
              - "engine-wasm/engine/**"
              - "transport-rust/**"
              - "browser/contracts/**"
            wml_server:
              - "wml-server/**"

  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root Node deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_SHARED_KEY }}
          workspaces: |
            engine-wasm/engine -> target

      - name: Cache wasm-pack binary
        id: cache-wasm-pack-repo-hygiene
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-0.13.1
          restore-keys: |
            ${{ runner.os }}-wasm-pack-

      - name: Install wasm-pack (if cache miss)
        if: steps.cache-wasm-pack-repo-hygiene.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Build WaveNav WASM package
        working-directory: engine-wasm/engine
        run: wasm-pack build --target web --out-dir ../pkg

      - name: Generate host-sample example manifest
        run: pnpm --dir engine-wasm/host-sample run examples:generate

      - name: Git whitespace check
        run: git diff --check

      - name: Browser frontend typecheck (contract drift guard)
        run: pnpm --dir browser/frontend exec tsc --noEmit

      - name: Workspace typecheck
        run: pnpm typecheck:node

      - name: Workspace lint
        run: pnpm lint:node

      - name: Workspace format check
        run: pnpm format:check:node

      - name: Transport contract parity check
        run: node scripts/check-transport-contract-parity.mjs

  rust-engine:
    name: Rust Engine
    needs: [changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.rust_engine == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_SHARED_KEY }}
          workspaces: |
            engine-wasm/engine -> target

      - name: Rust fmt check
        working-directory: engine-wasm/engine
        run: cargo fmt --check

      - name: Rust coverage gate
        working-directory: engine-wasm/engine
        run: cargo llvm-cov --all-features --summary-only --fail-under-lines ${{ env.ENGINE_COV_LINES }} --fail-under-functions ${{ env.ENGINE_COV_FUNCS }}

      # Enable when warning budget is defined.
      - name: Rust clippy (disabled)
        if: ${{ false }}
        working-directory: engine-wasm/engine
        run: cargo clippy --all-targets --all-features -- -D warnings

  rust-transport:
    name: Rust Transport
    needs: [changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.rust_transport == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libwbxml runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libwbxml2-dev || sudo apt-get install -y libwbxml2-0
          sudo apt-get install -y libwbxml2-utils || true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_SHARED_KEY }}
          workspaces: |
            transport-rust -> target

      - name: Rust fmt check
        working-directory: transport-rust
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: transport-rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust coverage gate
        working-directory: transport-rust
        run: RUST_TEST_THREADS=1 cargo llvm-cov --all-features --summary-only --fail-under-lines ${{ env.TRANSPORT_COV_LINES }} --fail-under-functions ${{ env.TRANSPORT_COV_FUNCS }} -- --test-threads=1

  host-sample:
    name: WaveNav Host Sample Build
    needs: [changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.host_sample == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_SHARED_KEY }}
          workspaces: |
            engine-wasm/engine -> target

      - name: Cache wasm-pack binary
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-0.13.1
          restore-keys: |
            ${{ runner.os }}-wasm-pack-

      - name: Install wasm-pack (if cache miss)
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Cache diagnostics
        run: |
          echo "wasm-pack cache hit: ${{ steps.cache-wasm-pack.outputs.cache-hit }}"
          echo "node: $(node --version || true)"

      - name: Build WaveNav WASM package
        working-directory: engine-wasm/engine
        run: wasm-pack build --target web --out-dir ../pkg

      - name: Verify wasm package output
        run: test -f engine-wasm/pkg/wavenav_engine.js

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install host-sample deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build host-sample
        run: pnpm --dir engine-wasm/host-sample run build

      - name: Host-sample typecheck
        run: pnpm --dir engine-wasm/host-sample run typecheck

      - name: Host-sample lint
        run: pnpm --dir engine-wasm/host-sample run lint

      - name: Host-sample format check
        run: pnpm --dir engine-wasm/host-sample run format:check

  marketing-site:
    name: Marketing Site Build
    needs: [changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.marketing_site == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: marketing-site/pnpm-lock.yaml

      - name: Install marketing-site deps
        run: pnpm --dir marketing-site --ignore-workspace install --frozen-lockfile

      - name: Build marketing-site
        run: pnpm --dir marketing-site --ignore-workspace run build

  browser-shell:
    name: Browser Shell Skeleton Checks
    needs: [changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.browser_shell == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Browser Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ env.RUST_BROWSER_KEY }}
          workspaces: |
            browser/src-tauri -> target

      - name: Ensure Tauri frontendDist exists for compile-time config
        run: |
          mkdir -p browser/frontend/dist
          test -f browser/frontend/dist/index.html || echo '<!doctype html><title>ci-placeholder</title>' > browser/frontend/dist/index.html

      - name: Browser Rust fmt check
        working-directory: browser/src-tauri
        run: cargo fmt --check

      - name: Browser contract codegen drift check
        run: |
          cargo run --manifest-path browser/src-tauri/Cargo.toml --bin generate_contracts
          git diff --exit-code -- browser/contracts/generated/engine-host.ts browser/contracts/generated/transport-host.ts browser/contracts/generated/tauri-host-client.ts

      - name: Browser Rust coverage gate
        working-directory: browser/src-tauri
        run: cargo llvm-cov --all-features --lib --summary-only --fail-under-lines ${{ env.BROWSER_COV_LINES }} --fail-under-functions ${{ env.BROWSER_COV_FUNCS }}

  wml-server:
    name: WML Server Sanity
    needs: [changes]
    if: ${{ github.event_name != 'pull_request' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.wml_server == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: wml-server/package-lock.json

      - name: Install wml-server deps
        run: npm --prefix wml-server ci

      - name: Node syntax check
        run: node --check wml-server/server.js

  # Future jobs intentionally disabled until those layers are ready:
  # - browser frontend lint/test
