name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install root Node deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit (non-language-specific hooks)
        env:
          SKIP: rust-fmt-check,rust-test,host-sample-build
        run: pre-commit run --all-files

      - name: Check generated transport contract
        run: pnpm run check:transport-contract

  rust-engine:
    name: Rust Engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wavenav-rust
          workspaces: |
            engine-wasm/engine -> target

      - name: Rust fmt check
        working-directory: engine-wasm/engine
        run: cargo fmt --check

      - name: Rust tests
        working-directory: engine-wasm/engine
        run: cargo test

      # Enable when warning budget is defined.
      - name: Rust clippy (disabled)
        if: ${{ false }}
        working-directory: engine-wasm/engine
        run: cargo clippy --all-targets --all-features -- -D warnings

  rust-engine-coverage:
    name: Rust Engine Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wavenav-rust
          workspaces: |
            engine-wasm/engine -> target

      - name: Rust coverage gate
        working-directory: engine-wasm/engine
        run: cargo llvm-cov --all-features --summary-only --fail-under-lines 90 --fail-under-functions 85

  host-sample:
    name: WaveNav Host Sample Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wavenav-rust
          workspaces: |
            engine-wasm/engine -> target

      - name: Cache wasm-pack binary
        id: cache-wasm-pack
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-0.13.1
          restore-keys: |
            ${{ runner.os }}-wasm-pack-

      - name: Install wasm-pack (if cache miss)
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: cargo install wasm-pack --version 0.13.1 --locked

      - name: Cache diagnostics
        run: |
          echo "wasm-pack cache hit: ${{ steps.cache-wasm-pack.outputs.cache-hit }}"
          echo "node: $(node --version || true)"

      - name: Build WaveNav WASM package
        working-directory: engine-wasm/engine
        run: wasm-pack build --target web --out-dir ../pkg

      - name: Verify wasm package output
        run: test -f engine-wasm/pkg/wavenav_engine.js

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: engine-wasm/host-sample/pnpm-lock.yaml

      - name: Install host-sample deps
        run: pnpm --dir engine-wasm/host-sample --ignore-workspace install --frozen-lockfile

      - name: Build host-sample
        run: pnpm --dir engine-wasm/host-sample run build

      # Enable when scripts are introduced.
      - name: Host-sample lint (disabled)
        if: ${{ false }}
        run: pnpm --dir engine-wasm/host-sample run lint

      - name: Host-sample tests (disabled)
        if: ${{ false }}
        run: pnpm --dir engine-wasm/host-sample run test

  marketing-site:
    name: Marketing Site Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: marketing-site/pnpm-lock.yaml

      - name: Install marketing-site deps
        run: pnpm --dir marketing-site --ignore-workspace install --frozen-lockfile

      - name: Build marketing-site
        run: pnpm --dir marketing-site --ignore-workspace run build

  browser-shell:
    name: Browser Shell Skeleton Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Browser Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wavenav-browser-rust
          workspaces: |
            browser/src-tauri -> target

      - name: Ensure Tauri frontendDist exists for compile-time config
        run: |
          mkdir -p browser/frontend/dist
          test -f browser/frontend/dist/index.html || echo '<!doctype html><title>ci-placeholder</title>' > browser/frontend/dist/index.html

      - name: Browser Rust fmt check
        working-directory: browser/src-tauri
        run: cargo fmt --check

      - name: Browser Rust compile check
        working-directory: browser/src-tauri
        run: cargo check

      - name: Browser smoke tests
        working-directory: browser/src-tauri
        run: cargo test

  wml-server:
    name: WML Server Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: wml-server/package-lock.json

      - name: Install wml-server deps
        run: npm --prefix wml-server ci

      - name: Node syntax check
        run: node --check wml-server/server.js

  transport-http-smoke:
    name: Transport HTTP Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: wml-server/package-lock.json

      - name: Install wml-server deps
        run: npm --prefix wml-server ci

      - name: Install transport-python deps
        run: pip install -r transport-python/requirements.txt

      - name: Run transport HTTP smoke check
        run: bash scripts/transport-http-smoke.sh

  transport-python:
    name: Transport Python Lint + Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install transport-python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r transport-python/requirements.txt -r transport-python/requirements-dev.txt

      - name: Ruff check
        run: ruff check transport-python

      - name: Pytest
        run: pytest transport-python/tests

  # Future jobs intentionally disabled until those layers are ready:
  # - browser frontend lint/test
