name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "27 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5

  rust-audit:
    name: Rust Advisory Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: wavenav-security-rust-audit
          workspaces: |
            engine-wasm/engine -> target
            transport-rust -> target
            browser/src-tauri -> target

      - name: Install cargo-audit
        uses: taiki-e/install-action@3a26e1142857d4ed43aacfecf39df466de8a685d # cargo-audit

      - name: Audit engine runtime dependencies
        working-directory: engine-wasm/engine
        run: cargo audit

      - name: Audit transport dependencies
        working-directory: transport-rust
        run: cargo audit

      - name: Audit browser host dependencies
        working-directory: browser/src-tauri
        run: cargo audit

  node-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit workspace dependencies (high+)
        run: pnpm audit --audit-level high

      - name: Setup Node cache for wml-server npm audit
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: wml-server/package-lock.json

      - name: Audit npm-only wml-server dependencies (high+)
        run: npm --prefix wml-server audit --audit-level=high
