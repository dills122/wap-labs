name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "27 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  rust-audit:
    name: Rust Advisory Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wavenav-security-rust-audit
          workspaces: |
            engine-wasm/engine -> target
            transport-rust -> target
            browser/src-tauri -> target

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit engine runtime dependencies
        working-directory: engine-wasm/engine
        run: cargo audit

      - name: Audit transport dependencies
        working-directory: transport-rust
        run: cargo audit

      - name: Audit browser host dependencies
        working-directory: browser/src-tauri
        run: cargo audit

  node-audit:
    name: Node Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm workspace deps
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Audit workspace dependencies (high+)
        run: pnpm audit --audit-level high

      - name: Setup Node cache for wml-server npm audit
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: wml-server/package-lock.json

      - name: Audit npm-only wml-server dependencies (high+)
        run: npm --prefix wml-server audit --audit-level=high
