name: Dependabot Lockfile Sync

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-lockfiles:
    name: Sync lockfiles for Dependabot PRs
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            marketing-site/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Refresh root pnpm lockfile
        run: pnpm install --lockfile-only

      - name: Refresh marketing-site pnpm lockfile
        run: pnpm --dir marketing-site --ignore-workspace install --lockfile-only

      - name: Refresh wml-server npm lockfile
        run: npm --prefix wml-server install --package-lock-only

      - name: Refresh transport-rust Cargo.lock
        run: cargo update --workspace
        working-directory: transport-rust

      - name: Refresh browser/src-tauri Cargo.lock
        run: cargo update --workspace
        working-directory: browser/src-tauri

      - name: Refresh engine fuzz Cargo.lock
        run: cargo update --workspace
        working-directory: engine-wasm/engine/fuzz

      - name: Commit lockfile updates (if needed)
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7
        with:
          commit_message: "chore: sync lockfiles"
          file_pattern: |
            pnpm-lock.yaml
            marketing-site/pnpm-lock.yaml
            wml-server/package-lock.json
            transport-rust/Cargo.lock
            browser/src-tauri/Cargo.lock
            engine-wasm/engine/fuzz/Cargo.lock
