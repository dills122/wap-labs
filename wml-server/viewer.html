<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WaveNav WAP Browser Emulator</title>
  <style>
    :root {
      --bg: #e7ecef;
      --device: #20262e;
      --screen: #f4f8ec;
      --ink: #172019;
      --accent: #0f5a3a;
      --border: #0f1720;
      --muted: #4b5563;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Menlo", "SFMono-Regular", "Courier New", monospace;
      background: radial-gradient(circle at 20% 0%, #f9fafb, var(--bg));
      color: #0b1220;
      padding: 1.25rem;
      display: grid;
      gap: 1rem;
      place-items: center;
    }

    .toolbar {
      width: min(860px, 100%);
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 0.55rem;
    }

    .toolbar input,
    .toolbar button,
    .status {
      border: 1px solid #111827;
      border-radius: 6px;
      padding: 0.6rem 0.7rem;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fff;
    }

    .toolbar button {
      background: #e5e7eb;
      cursor: pointer;
      font-weight: 600;
    }

    .status {
      width: min(860px, 100%);
      color: var(--muted);
    }

    .device {
      width: min(860px, 100%);
      border: 2px solid #0b1220;
      border-radius: 18px;
      background: linear-gradient(165deg, #1f2937, var(--device));
      box-shadow: 0 18px 40px rgba(15, 23, 32, 0.22);
      padding: 1rem;
      display: grid;
      gap: 0.8rem;
    }

    .screen {
      border: 2px solid var(--border);
      border-radius: 10px;
      background: var(--screen);
      color: var(--ink);
      min-height: 420px;
      padding: 0.9rem;
      overflow: auto;
    }

    .card-title {
      border-bottom: 1px dashed #49604e;
      margin: 0 0 0.65rem;
      padding-bottom: 0.4rem;
      font-size: 1.1rem;
    }

    .line { margin: 0.35rem 0; }

    .inline-link,
    .softkey {
      border: 1px solid #2d4a3f;
      border-radius: 5px;
      background: #d3e4d7;
      color: #0e2f24;
      font-family: inherit;
      cursor: pointer;
      padding: 0.2rem 0.45rem;
      font-size: 0.9rem;
    }

    .inline-link { margin-left: 0.35rem; }

    .field-row {
      display: grid;
      gap: 0.35rem;
      margin: 0.55rem 0;
    }

    .field-row input {
      border: 1px solid #34423c;
      border-radius: 4px;
      padding: 0.35rem 0.45rem;
      font-family: inherit;
      background: #f9fcf7;
    }

    .softkeys {
      border-top: 1px solid #415164;
      padding-top: 0.7rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .error {
      white-space: pre-wrap;
      color: #7f1d1d;
      background: #fee2e2;
      border: 1px solid #b91c1c;
      border-radius: 6px;
      padding: 0.6rem;
      font-size: 0.88rem;
    }

    @media (max-width: 720px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .toolbar input { grid-column: 1 / -1; }
      .screen { min-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="url" value="/login" aria-label="Target URL" />
    <button id="load">Load</button>
    <button id="back">Back</button>
  </div>

  <div id="status" class="status">Ready.</div>

  <section class="device">
    <article id="screen" class="screen"></article>
    <div id="softkeys" class="softkeys"></div>
  </section>

  <script>
    const state = {
      history: [],
      currentPath: '/login',
      currentDeck: null,
      currentCardId: null,
      fields: {},
    };

    const urlInput = document.getElementById('url');
    const screen = document.getElementById('screen');
    const softkeys = document.getElementById('softkeys');
    const statusEl = document.getElementById('status');

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function normalizePath(target) {
      if (!target) return state.currentPath;
      if (target.startsWith('#')) return target;

      if (/^https?:\/\//i.test(target)) {
        const absolute = new URL(target);
        return `${absolute.pathname}${absolute.search}`;
      }

      if (target.startsWith('/gateway')) {
        return target;
      }

      if (target.startsWith('/')) {
        return target;
      }

      const basePath = state.currentPath.split('?')[0];
      const dir = basePath.endsWith('/')
        ? basePath
        : basePath.slice(0, basePath.lastIndexOf('/') + 1);
      return `${dir}${target}`;
    }

    function getCards(deckXml) {
      return Array.from(deckXml.getElementsByTagName('card'));
    }

    function getCardById(deckXml, cardId) {
      if (!deckXml || !cardId) return null;
      return deckXml.querySelector(`card[id="${CSS.escape(cardId)}"]`);
    }

    function createTextSpan(text) {
      const span = document.createElement('span');
      span.textContent = text;
      return span;
    }

    function resolvePostField(value) {
      if (!value) return '';
      const match = value.match(/^\$\(([^)]+)\)$/);
      if (match) {
        return state.fields[match[1]] || '';
      }
      return value;
    }

    async function runGo(goEl, pushHistory = true) {
      if (!goEl) return;

      const method = (goEl.getAttribute('method') || 'get').toUpperCase();
      const href = goEl.getAttribute('href') || '/';

      if (href.startsWith('#')) {
        renderCard(href.slice(1));
        return;
      }

      const targetPath = normalizePath(href);
      if (method === 'POST') {
        const payload = new URLSearchParams();
        Array.from(goEl.getElementsByTagName('postfield')).forEach((field) => {
          const name = field.getAttribute('name') || '';
          if (!name) return;
          payload.set(name, resolvePostField(field.getAttribute('value') || ''));
        });

        await loadDeck(targetPath, {
          method: 'POST',
          body: payload.toString(),
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          pushHistory,
        });
        return;
      }

      await loadDeck(targetPath, { method: 'GET', pushHistory });
    }

    function renderInline(container, xmlNode) {
      if (xmlNode.nodeType === Node.TEXT_NODE) {
        container.appendChild(createTextSpan(xmlNode.textContent));
        return;
      }

      if (xmlNode.nodeType !== Node.ELEMENT_NODE) return;

      const name = xmlNode.tagName.toLowerCase();
      if (name === 'a') {
        const button = document.createElement('button');
        button.className = 'inline-link';
        button.type = 'button';
        button.textContent = xmlNode.textContent.trim() || xmlNode.getAttribute('href') || 'Open';
        button.addEventListener('click', () => {
          const href = xmlNode.getAttribute('href') || '/';
          if (href.startsWith('#')) {
            renderCard(href.slice(1));
            return;
          }
          loadDeck(normalizePath(href), { method: 'GET', pushHistory: true });
        });
        container.appendChild(button);
        return;
      }

      if (name === 'input') {
        const fieldName = xmlNode.getAttribute('name') || '';
        const label = document.createElement('label');
        label.className = 'field-row';
        label.textContent = fieldName || 'input';

        const input = document.createElement('input');
        input.type = xmlNode.getAttribute('format') === '*N' ? 'password' : 'text';
        input.maxLength = parseInt(xmlNode.getAttribute('maxlength') || '128', 10);
        input.value = state.fields[fieldName] || xmlNode.getAttribute('value') || '';
        state.fields[fieldName] = input.value;
        input.addEventListener('input', (event) => {
          state.fields[fieldName] = event.target.value;
        });

        label.appendChild(input);
        container.appendChild(label);
        return;
      }

      if (name === 'br') {
        container.appendChild(document.createElement('br'));
        return;
      }

      Array.from(xmlNode.childNodes).forEach((child) => renderInline(container, child));
    }

    function renderCard(cardId) {
      const deck = state.currentDeck;
      if (!deck) {
        screen.innerHTML = '<div class="error">No deck loaded.</div>';
        softkeys.innerHTML = '';
        return;
      }

      const cards = getCards(deck);
      const fallback = cards[0] || null;
      const card = getCardById(deck, cardId) || getCardById(deck, state.currentCardId) || fallback;

      if (!card) {
        screen.innerHTML = '<div class="error">Deck loaded, but no &lt;card&gt; elements were found.</div>';
        softkeys.innerHTML = '';
        return;
      }

      state.currentCardId = card.getAttribute('id') || '';

      screen.innerHTML = '';
      softkeys.innerHTML = '';

      const heading = document.createElement('h2');
      heading.className = 'card-title';
      heading.textContent = card.getAttribute('title') || state.currentCardId || 'Untitled Card';
      screen.appendChild(heading);

      Array.from(card.childNodes).forEach((node) => {
        if (node.nodeType === Node.ELEMENT_NODE && node.tagName.toLowerCase() === 'do') {
          return;
        }

        const line = document.createElement('div');
        line.className = 'line';
        renderInline(line, node);
        if (line.textContent.trim() || line.querySelector('button,input,label')) {
          screen.appendChild(line);
        }
      });

      const actions = Array.from(card.getElementsByTagName('do'));
      actions.forEach((doEl) => {
        const action = document.createElement('button');
        action.type = 'button';
        action.className = 'softkey';
        action.textContent = doEl.getAttribute('label') || doEl.getAttribute('type') || 'Action';
        action.addEventListener('click', async () => {
          const hasPrev = doEl.getElementsByTagName('prev').length > 0;
          if (hasPrev) {
            goBack();
            return;
          }
          const goEl = doEl.getElementsByTagName('go')[0];
          await runGo(goEl, true);
        });
        softkeys.appendChild(action);
      });
    }

    async function loadDeck(path, options = {}) {
      const method = options.method || 'GET';
      const pushHistory = options.pushHistory !== false;

      if (pushHistory && state.currentPath && path !== state.currentPath) {
        state.history.push(state.currentPath);
      }

      setStatus(`Loading ${method} ${path} ...`);
      urlInput.value = path;

      try {
        const response = await fetch(path, {
          method,
          headers: options.headers || {},
          body: options.body,
        });

        const bodyText = await response.text();
        state.currentPath = path;

        const parser = new DOMParser();
        const parsed = parser.parseFromString(bodyText, 'text/xml');
        if (parsed.querySelector('parsererror')) {
          screen.innerHTML = '';
          softkeys.innerHTML = '';
          const error = document.createElement('div');
          error.className = 'error';
          error.textContent = `Non-WML response (${response.status}).\n\n${bodyText.slice(0, 3000)}`;
          screen.appendChild(error);
          setStatus(`HTTP ${response.status} (${response.headers.get('content-type') || 'unknown content type'})`);
          return;
        }

        state.currentDeck = parsed;
        renderCard(null);
        setStatus(`HTTP ${response.status} ${response.headers.get('content-type') || ''}`.trim());
      } catch (err) {
        screen.innerHTML = `<div class="error">${String(err.message || err)}</div>`;
        softkeys.innerHTML = '';
        setStatus('Request failed.');
      }
    }

    function goBack() {
      const previous = state.history.pop();
      if (!previous) {
        setStatus('No history entry.');
        return;
      }
      loadDeck(previous, { method: 'GET', pushHistory: false });
    }

    document.getElementById('load').addEventListener('click', () => {
      loadDeck(normalizePath(urlInput.value.trim()), { method: 'GET', pushHistory: true });
    });

    document.getElementById('back').addEventListener('click', goBack);

    urlInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        loadDeck(normalizePath(urlInput.value.trim()), { method: 'GET', pushHistory: true });
      }
    });

    loadDeck('/login', { method: 'GET', pushHistory: false });
  </script>
</body>
</html>
